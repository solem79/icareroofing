<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iCare Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    h1 { text-align: center; }
    .form-group { margin-bottom: 15px; }
    input, textarea, button { width: 100%; padding: 8px; margin-top: 5px; }
    button { cursor: pointer; background: #4CAF50; color: white; border: none; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h1>iCare Admin Panel</h1>

  <!-- Slider Upload -->
  <h2>Upload Slider</h2>
  <div class="form-group">
    <label>Title:</label>
    <input type="text" id="sliderTitle" placeholder="Enter slider title" required>
  </div>
  <div class="form-group">
    <label>Description:</label>
    <textarea id="sliderDesc" placeholder="Enter slider description" required></textarea>
  </div>
  <div class="form-group">
    <label>Choose Image:</label>
    <input type="file" id="sliderInput" accept="image/*" required>
  </div>
  <button type="button" id="sliderUploadBtn">Upload Slider</button>

  <hr>

  <!-- Gallery Upload -->
  <h2>Upload Gallery Image</h2>
  <div class="form-group">
    <label>Title:</label>
    <input type="text" id="galleryTitle" placeholder="Gallery title">
  </div>
  <div class="form-group">
    <label>Choose Image:</label>
    <input type="file" id="galleryInput" accept="image/*" required>
  </div>
  <button type="button" id="galleryUploadBtn">Upload Gallery Image</button>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/upload.js"></script>
  
  
  
  
  
  
  
  
  
  
  
  
</body>
</html>
